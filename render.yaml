# Render Blueprint Specification
# Deploy both Flask API and Streamlit UI in a single click!
services:
  - type: web
    name: travel-planner-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -b 0.0.0.0:$PORT "app:create_app('production')"
    disk:
      name: sqlite-db
      mountPath: /opt/render/project/src/backend/database
      sizeGB: 1
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: PORT
        value: 5000
      - key: IBM_API_KEY
        sync: false # User will fill this in Render UI
      - key: IBM_PROJECT_ID
        sync: false # User will fill this in Render UI
      - key: IBM_WATSONX_URL
        value: https://us-south.ml.cloud.ibm.com
      - key: GRANITE_MODEL_ID
        value: ibm/granite-13b-instruct-v2
      - key: WEATHER_API_KEY
        sync: false # User will fill this in Render UI

  - type: web
    name: travel-planner-ui
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run streamlit_app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: BACKEND_URL
        fromService:
          name: travel-planner-api
          type: web
          property: url

