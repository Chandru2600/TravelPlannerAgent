{% extends "base.html" %}
{% block title %}Login — AI Travel Planner{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header text-center">
        <div class="auth-logo">✈</div>
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-sub text-muted">Log in to your AI Travel Planner account</p>
      </div>
      <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email Address</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required />
          </div>
        </div>
        <div class="mb-3">
          <div class="d-flex justify-content-between">
            <label class="form-label fw-semibold">Password</label>
          </div>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" id="loginPwd" class="form-control" placeholder="••••••••" required />
            <button type="button" class="btn btn-outline-secondary" onclick="togglePwd('loginPwd', this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-ibm w-100 py-2 mt-2">
          <i class="bi bi-box-arrow-in-right me-2"></i>Login
        </button>
      </form>
      <div class="auth-divider"><span>New here?</span></div>
      <a href="{{ url_for('auth.register') }}" class="btn btn-outline-primary w-100">
        Create an Account
      </a>
    </div>
    <div class="auth-branding text-center mt-4">
      <span class="badge badge-ibm">IBM Granite</span>
      <span class="ms-2 text-muted small">IBM SkillsBuild Internship Project</span>
    </div>
  </div>
</div>
{% endblock %}
